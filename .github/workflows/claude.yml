name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Project Setup
        run: |
          npm run setup
          npm run dev:daemon

      - name: Write MCP config
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": [
                  "@playwright/mcp@latest",
                  "--allowed-origins",
                  "localhost:3000;cdn.tailwindcss.com;esm.sh"
                ]
              }
            }
          }
          EOF

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            The project is already set up and running. The dev server is available at http://localhost:3000.
            Dev server logs are written to logs.txt in the project root.
            You can query the SQLite database using the sqlite3 CLI (e.g. sqlite3 prisma/dev.db).
            Use the mcp__playwright tool to interact with and test the app in the browser.

          claude_args: --mcp-config /tmp/mcp-config.json

      - name: Post Claude response as issue comment
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          python3 - <<'EOF'
          import json, os, sys, urllib.request

          output_file = "/home/runner/work/_temp/claude-execution-output.json"
          if not os.path.exists(output_file):
              print("No output file, skipping")
              sys.exit(0)

          with open(output_file) as f:
              data = json.load(f)

          if isinstance(data, list):
              item = next((i for i in data if i.get("type") == "result"), None)
              comment = item.get("result") if item else None
          else:
              comment = data.get("output") or data.get("result") or data.get("content")

          if not comment:
              print("No content found")
              print(json.dumps(data, indent=2))
              sys.exit(0)

          token = os.environ["GITHUB_TOKEN"]
          issue_number = os.environ["ISSUE_NUMBER"]
          url = f"https://api.github.com/repos/CesarRC23/uigen/issues/{issue_number}/comments"
          payload = json.dumps({"body": comment}).encode()
          req = urllib.request.Request(url, data=payload, method="POST", headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          })
          with urllib.request.urlopen(req) as resp:
              print(f"Posted comment: {resp.status}")
          EOF
