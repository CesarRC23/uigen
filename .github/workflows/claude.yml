name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Project Setup
        run: |
          npm run setup
          npm run dev:daemon

      - name: Write MCP config
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": [
                  "@playwright/mcp@latest",
                  "--allowed-origins",
                  "localhost:3000;cdn.tailwindcss.com;esm.sh"
                ]
              }
            }
          }
          EOF

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            The project is already set up and running. The dev server is available at http://localhost:3000.
            Dev server logs are written to logs.txt in the project root.
            You can query the SQLite database using the sqlite3 CLI (e.g. sqlite3 prisma/dev.db).
            Use the mcp__playwright tool to interact with and test the app in the browser.

          claude_args: --mcp-config /tmp/mcp-config.json

      - name: Post Claude response as issue comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT_FILE="/home/runner/work/_temp/claude-execution-output.json"
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "No output file found, skipping"
            exit 0
          fi

          COMMENT=$(jq -r '.output // .result // .content // empty' "$OUTPUT_FILE" 2>/dev/null)
          if [ -z "$COMMENT" ]; then
            echo "No content extracted from output, skipping"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "issues" ] || [ "${{ github.event_name }}" = "issue_comment" ]; then
            NUMBER="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ] || [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            NUMBER="${{ github.event.pull_request.number }}"
          fi

          if [ -z "$NUMBER" ]; then
            echo "Could not determine issue/PR number, skipping"
            exit 0
          fi

          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "$COMMENT"
